<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../../../assets/favicon.svg" />
    <title>My Applications - Haven Space</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/global.css?v=1777136032299" />
    <link rel="stylesheet" href="../../../css/components/sidebar.css?v=1777136032299" />
    <link rel="stylesheet" href="../../../css/components/navbar.css?v=1777136032299" />
    <link rel="stylesheet" href="../../../css/components/status-banner.css?v=1777136032299" />
    <link rel="stylesheet" href="../../../css/views/boarder/boarder.css?v=1777136032299" />
    <link
      rel="stylesheet"
      href="../../../css/views/boarder/boarder-applications.css?v=1777136032299"
    />
  </head>
  <body data-view="boarder" data-dashboard-type="boarder">
    <div class="boarder-dashboard">
      <!-- Sidebar Container -->
      <div id="sidebar-container"></div>

      <!-- Main Content -->
      <main class="boarder-main">
        <!-- Navbar Container -->
        <div id="navbar-container"></div>

        <!-- Content Wrapper -->
        <div class="boarder-content">
          <!-- Status Banner Container (conditionally shown) -->
          <div
            id="boarder-status-banner-container"
            class="boarder-status-banner-wrapper"
            style="display: none"
          >
            <!-- Banner will be injected here by JavaScript -->
          </div>

          <!-- Applications Page -->
          <div class="applications-container">
            <!-- Page Header -->
            <div class="applications-header">
              <div class="applications-header-content">
                <h1 class="applications-title">My Applications</h1>
                <p class="applications-subtitle">
                  Track and manage your boarding house applications
                </p>
              </div>
              <div class="applications-header-actions">
                <a href="../../public/find-a-room.html" class="btn btn-primary">
                  <span data-icon="plus" data-icon-width="20" data-icon-height="20"></span>
                  Find More Rooms
                </a>
              </div>
            </div>

            <!-- Applications List -->
            <div class="applications-list" id="applications-list">
              <!-- Populated dynamically by applications.js -->
            </div>

            <!-- Empty State (shown when no applications) -->
            <div class="applications-empty" id="applications-empty" style="display: none">
              <div class="empty-state-icon">
                <span data-icon="document" data-icon-width="64" data-icon-height="64"></span>
              </div>
              <h3 class="empty-state-title">No Applications Yet</h3>
              <p class="empty-state-description">
                You haven't submitted any rental applications yet. Start browsing available rooms
                and find your perfect boarding house!
              </p>
              <a href="../../public/find-a-room.html" class="btn btn-primary">
                <span data-icon="search" data-icon-width="20" data-icon-height="20"></span>
                Find Available Rooms
              </a>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- JavaScript -->
    <script type="module">
      import { initBoarderApplications } from '../../../js/views/boarder/applications.js';

      document.addEventListener('DOMContentLoaded', () => {
        initBoarderApplications();
      });
    </script>
  </body>
</html>
