<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../../../assets/favicon.svg" />
    <title>Announcements - Haven Space</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/global.css?v=1777136032299" />
    <link rel="stylesheet" href="../../../css/components/sidebar.css?v=1777136032299" />
    <link rel="stylesheet" href="../../../css/components/navbar.css?v=1777136032299" />
    <link
      rel="stylesheet"
      href="../../../css/views/boarder/boarder-announcements.css?v=1777136032299"
    />
  </head>
  <body data-view="boarder" data-dashboard-type="boarder">
    <div class="boarder-dashboard">
      <!-- Sidebar Container -->
      <div id="sidebar-container"></div>

      <!-- Main Content -->
      <main class="boarder-main">
        <!-- Navbar Container -->
        <div id="navbar-container"></div>

        <!-- Content Wrapper -->
        <div class="boarder-content">
          <!-- Page Header -->
          <div class="boarder-page-header">
            <div class="boarder-page-title">
              <h1>
                <span class="icon-placeholder" data-icon="bellAlert"></span>
                Announcements
              </h1>
              <p>Stay updated with important announcements from your landlord</p>
            </div>
          </div>

          <!-- Filter Tabs -->
          <div class="announcement-filter-tabs">
            <button class="announcement-filter-tab active" data-filter="all">
              <span class="icon-placeholder" data-icon="grid2x2"></span>
              All
            </button>
            <button class="announcement-filter-tab" data-filter="unread">
              <span class="icon-placeholder" data-icon="eye"></span>
              Unread
            </button>
            <button class="announcement-filter-tab" data-filter="urgent">
              <span class="icon-placeholder" data-icon="exclamationTriangle"></span>
              Urgent
            </button>
            <button class="announcement-filter-tab" data-filter="maintenance">
              <span class="icon-placeholder" data-icon="wrenchScrewdriver"></span>
              Maintenance
            </button>
            <button class="announcement-filter-tab" data-filter="general">
              <span class="icon-placeholder" data-icon="clipboard"></span>
              General
            </button>
          </div>

          <!-- Announcements List -->
          <div class="boarder-announcements-list" id="announcements-list">
            <!-- Announcements will be loaded dynamically -->
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="../../../js/main.js?v=1777136032299"></script>
    <script type="module" src="../../../js/views/boarder/announcements.js?v=1777136032299"></script>
    <script type="module">
      import { getIcon } from '../../../js/shared/icons.js';

      document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.icon-placeholder').forEach(el => {
          const iconName = el.dataset.icon;
          const className = el.className.replace('icon-placeholder', '').trim();
          const iconHtml = getIcon(iconName, { className });
          el.outerHTML = iconHtml;
        });
      });
    </script>
  </body>
</html>
