<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../../../assets/favicon.svg" />
    <title>Announcements - Haven Space</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/global.css?v=1777136032299" />
    <link rel="stylesheet" href="../../../css/components/sidebar.css?v=1777136032299" />
    <link rel="stylesheet" href="../../../css/components/navbar.css?v=1777136032299" />
    <link
      rel="stylesheet"
      href="../../../css/views/landlord/landlord-announcements.css?v=1777136032299"
    />
  </head>
  <body data-view="landlord" data-dashboard-type="landlord">
    <div class="landlord-dashboard">
      <!-- Sidebar Container -->
      <div id="sidebar-container"></div>

      <!-- Main Content -->
      <main class="landlord-main">
        <!-- Navbar Container -->
        <div id="navbar-container"></div>

        <!-- Content Wrapper -->
        <div class="landlord-content">
          <!-- Page Header -->
          <div class="landlord-page-header">
            <div class="landlord-page-title">
              <h1>
                <span
                  data-icon="announcement"
                  data-icon-width="24"
                  data-icon-height="24"
                  data-icon-stroke-width="2"
                ></span>
                Announcements
              </h1>
              <p>Create and manage announcements for your boarders</p>
            </div>
            <div class="landlord-page-actions">
              <button class="landlord-btn landlord-btn-primary" id="create-announcement-btn">
                <span
                  data-icon="plus"
                  data-icon-width="24"
                  data-icon-height="24"
                  data-icon-stroke-width="2"
                ></span>
                Create Announcement
              </button>
            </div>
          </div>

          <!-- Create Announcement Modal -->
          <div class="landlord-modal-overlay" id="announcement-modal-overlay">
            <div
              class="landlord-announcement-form-container"
              id="announcement-form-container"
              role="dialog"
              aria-labelledby="modal-title"
              aria-modal="true"
            >
              <div class="landlord-announcement-form-card">
                <div class="landlord-form-header">
                  <h2 id="modal-title">Create New Announcement</h2>
                  <button class="landlord-close-form" id="close-form-btn">
                    <span
                      data-icon="xMark"
                      data-icon-width="24"
                      data-icon-height="24"
                      data-icon-stroke-width="2"
                    ></span>
                  </button>
                </div>

                <form class="landlord-form" id="announcement-form">
                  <div class="landlord-form-group">
                    <label class="landlord-form-label" for="announcement-title">
                      Title <span class="landlord-required">*</span>
                    </label>
                    <input
                      type="text"
                      id="announcement-title"
                      class="landlord-form-input"
                      placeholder="e.g., Water Maintenance Scheduled"
                      required
                    />
                  </div>

                  <div class="landlord-form-group">
                    <label class="landlord-form-label" for="announcement-category">
                      Category
                    </label>
                    <select id="announcement-category" class="landlord-form-select">
                      <option value="general">General</option>
                      <option value="maintenance">Maintenance</option>
                      <option value="urgent">Urgent</option>
                      <option value="reminder">Reminder</option>
                      <option value="event">Event</option>
                    </select>
                  </div>

                  <div class="landlord-form-group">
                    <label class="landlord-form-label" for="announcement-priority">
                      Priority
                    </label>
                    <select id="announcement-priority" class="landlord-form-select">
                      <option value="low">Low</option>
                      <option value="medium" selected>Medium</option>
                      <option value="high">High</option>
                    </select>
                  </div>

                  <div class="landlord-form-group">
                    <label class="landlord-form-label" for="announcement-description">
                      Description <span class="landlord-required">*</span>
                    </label>
                    <textarea
                      id="announcement-description"
                      class="landlord-form-textarea"
                      placeholder="Write your announcement here..."
                      rows="6"
                      required
                    ></textarea>
                  </div>

                  <div class="landlord-form-group">
                    <label class="landlord-form-label" for="announcement-properties">
                      Target Properties
                    </label>
                    <div class="landlord-checkbox-group">
                      <label class="landlord-checkbox">
                        <input type="checkbox" name="properties" value="all" checked />
                        <span>All Properties</span>
                      </label>
                      <!-- Properties will be loaded dynamically -->
                    </div>
                  </div>

                  <div class="landlord-form-group">
                    <label class="landlord-form-label" for="announcement-date">
                      Publish Date
                    </label>
                    <input type="date" id="announcement-date" class="landlord-form-input" />
                  </div>

                  <div class="landlord-form-actions">
                    <button type="button" class="landlord-btn landlord-btn-outline" id="cancel-btn">
                      Cancel
                    </button>
                    <button type="submit" class="landlord-btn landlord-btn-primary">
                      Publish Announcement
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>

          <!-- Announcements List -->
          <div class="landlord-announcements-list" id="announcements-list">
            <!-- Announcements will be loaded dynamically -->
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="../../../js/main.js?v=1777136032299"></script>
    <script
      type="module"
      src="../../../js/views/landlord/announcements.js?v=1777136032299"
    ></script>
  </body>
</html>
