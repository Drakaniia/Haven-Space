<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../../../assets/favicon.svg" />
    <title>Reset Password - Create New Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/global.css?v=1777136032299" />
    <link rel="stylesheet" href="../../../css/views/public/auth.css?v=1777136032299" />
  </head>
  <body>
    <!-- Reset Password Form (Centered Layout) -->
    <main class="auth-main">
      <div class="auth-container auth-container-narrow">
        <a href="../index.html" class="auth-logo">
          <img
            src="../../../assets/images/Haven_Space_Logo.png"
            alt="Haven Space"
            style="height: 28px; width: auto"
          />
          <span
            style="
              font-family: 'Plus Jakarta Sans', sans-serif;
              font-size: 20px;
              font-weight: 700;
              color: #333333;
              margin-left: 8px;
            "
            >Haven Space</span
          >
        </a>

        <h1 class="auth-title auth-title-small">Reset Your Password</h1>
        <p class="auth-subtitle">Create a new password for your account.</p>

        <form class="auth-form" id="resetPasswordForm">
          <div class="form-group">
            <label for="newPassword" class="form-label">New Password</label>
            <input
              type="password"
              id="newPassword"
              name="newPassword"
              class="form-input"
              placeholder="Enter your new password"
              required
              minlength="8"
            />
          </div>

          <div class="form-group">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              class="form-input"
              placeholder="Confirm your new password"
              required
              minlength="8"
            />
          </div>

          <button type="submit" class="auth-btn-primary auth-btn-full">Reset Password</button>
        </form>

        <p class="auth-footer-text">Remember your password? <a href="login.html">Log In</a></p>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@15.0.0"></script>
    <script src="../../../js/auth/reset-password.js?v=1777136032299"></script>
  </body>
</html>
