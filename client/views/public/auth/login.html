<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../../../assets/favicon.svg" />
    <title>Login - Find Your Place</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/global.css?v=1777136032299" />
    <link rel="stylesheet" href="../../../css/views/public/auth.css?v=1777136032299" />
  </head>
  <body>
    <div class="auth-split-container">
      <!-- Left Side - Login Form -->
      <div class="auth-split-left">
        <!-- Header -->
        <header class="auth-split-header">
          <a href="../index.html" class="auth-logo">
            <img
              src="../../../assets/images/Haven_Space_Logo.png"
              alt="Haven Space"
              style="height: 28px; width: auto"
            />
            <span
              style="
                font-family: 'Plus Jakarta Sans', sans-serif;
                font-size: 20px;
                font-weight: 700;
                color: #333333;
                margin-left: 8px;
              "
              >Haven Space</span
            >
          </a>
          <p class="auth-split-header-link">
            Don't have an account? <a href="choose.html">Sign Up</a>
          </p>
        </header>

        <!-- Login Form -->
        <main class="auth-split-content">
          <div class="auth-split-form-wrapper">
            <a href="../index.html" class="back-btn">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
              Back
            </a>
            <h1 class="auth-split-title">Welcome Back!</h1>
            <p class="auth-split-subtitle">
              We're excited to see you again. Please enter your details to continue.
            </p>

            <div class="social-login">
              <button class="social-btn social-btn-google">
                <img
                  src="../../../assets/svg/google-icon-logo.svg"
                  alt="Google"
                  style="width: 18px; height: 18px"
                />
                Log in with Google
              </button>
              <button class="social-btn social-btn-apple">
                <img
                  src="../../../assets/svg/apple-dark-logo.svg"
                  alt="Apple"
                  style="width: 18px; height: 18px"
                />
                Log in with Apple
              </button>
            </div>

            <div class="auth-divider">
              <span>or</span>
            </div>

            <form class="auth-form" id="loginForm">
              <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="form-input"
                  placeholder="Enter your email"
                  required
                />
              </div>

              <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="password-input-wrapper">
                  <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-input"
                    placeholder="Enter your password"
                    required
                  />
                  <button
                    type="button"
                    class="password-toggle"
                    id="passwordToggle"
                    aria-label="Toggle password visibility"
                  >
                    <img
                      src="../../../assets/svg/viewicon.svg"
                      alt="View Icon"
                      class="eye-open"
                      width="20"
                      height="20"
                    />
                    <img
                      src="../../../assets/svg/ViewOffSlashIcon.svg"
                      alt="View Off Slash Icon"
                      class="eye-closed hidden"
                      width="20"
                      height="20"
                    />
                  </button>
                </div>
                <a href="forgot-password.html" class="forgot-password-link">Forgot password?</a>
              </div>

              <button type="submit" class="auth-btn-primary auth-btn-full">Login</button>
            </form>

            <p class="auth-split-footer">© 2024. All Rights Reserved.</p>
          </div>
        </main>
      </div>

      <!-- Right Side - Image -->
      <div class="auth-split-right">
        <div class="auth-split-image-container">
          <img
            src="../../../assets/images/public/login_right.png"
            alt="Dashboard Preview"
            class="auth-split-image"
          />
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@15.0.0"></script>
    <script type="module" src="../../../js/auth/login.js?v=1777136032299"></script>

    <!-- Fallback login handler in case modules fail to load -->
    <script>
      // Wait for DOM to be ready
      document.addEventListener('DOMContentLoaded', function () {
        // Add a small delay to ensure modules have a chance to load
        setTimeout(function () {
          const form = document.getElementById('loginForm');
          // Check if module handler is already attached by looking for existing event listeners
          const hasModuleHandler = form && form.hasAttribute('data-module-handler-attached');

          if (form && !hasModuleHandler && !form.hasAttribute('data-fallback-handler-attached')) {
            console.log('Attaching fallback login handler');
            form.setAttribute('data-fallback-handler-attached', 'true');

            form.addEventListener('submit', async function (e) {
              e.preventDefault();
              console.log('Fallback login handler triggered');

              const formData = new FormData(form);
              const email = formData.get('email');
              const password = formData.get('password');

              if (!email || !password) {
                alert('Please enter both email and password');
                return;
              }

              try {
                // Use the same API base URL as the module
                const apiBaseUrl = window.location.hostname.includes('github.io')
                  ? 'https://fra.cloud.appwrite.io/v1'
                  : 'http://localhost:8000';
                const response = await fetch(`${apiBaseUrl}/auth/login.php`, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({ email, password }),
                });

                const data = await response.json();
                console.log('Login response:', data);

                if (data.success) {
                  localStorage.setItem('user', JSON.stringify(data.user));
                  localStorage.setItem('token', data.access_token);

                  // Redirect based on role
                  const basePath = '/views/';
                  if (data.user.role === 'admin') {
                    window.location.href = basePath + 'admin/index.html';
                  } else if (data.user.role === 'landlord') {
                    window.location.href = basePath + 'landlord/index.html';
                  } else {
                    window.location.href = basePath + 'boarder/find-a-room/index.html';
                  }
                } else {
                  alert('Login failed: ' + (data.error || 'Invalid credentials'));
                }
              } catch (error) {
                console.error('Login error:', error);
                alert('Login error: ' + error.message);
              }
            });
          }
        }, 1000); // 1 second delay
      });
    </script>
  </body>
</html>
