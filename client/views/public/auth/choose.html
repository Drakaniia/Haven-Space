<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../../../assets/favicon.svg" />
    <title>Join Haven Space</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/global.css" />
    <link rel="stylesheet" href="../../../css/views/public/auth.css" />
    <link rel="stylesheet" href="../../../css/views/public/auth/choose.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="choose-header">
      <a
        href="../index.html"
        class="auth-logo"
        style="display: flex; align-items: center; text-decoration: none"
      >
        <img
          src="../../../assets/images/Haven_Space_Logo.png"
          alt="Haven Space"
          style="height: 28px; width: auto"
        />
        <span
          style="
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #333333;
            margin-left: 8px;
          "
          >Haven Space</span
        >
      </a>
    </header>

    <!-- Main Content -->
    <main class="choose-main">
      <div class="choose-container">
        <h1 class="choose-title">Join as a landlord or boarder</h1>

        <div class="role-selection">
          <!-- Boarder Card -->
          <div class="role-card" data-role="boarder">
            <div class="role-card-content">
              <div class="role-icon">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                  <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
              </div>
              <div class="role-radio"></div>
            </div>
            <p class="role-text">I'm a boarder,<br />looking for a room</p>
            <input
              type="radio"
              name="role"
              id="roleBoarder"
              value="boarder"
              style="display: none"
            />
          </div>

          <!-- Landlord Card -->
          <div class="role-card" data-role="landlord">
            <div class="role-card-content">
              <div class="role-icon">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0ZM19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"
                  ></path>
                </svg>
              </div>
              <div class="role-radio"></div>
            </div>
            <p class="role-text">I'm a landlord,<br />looking for a boarder</p>
            <input
              type="radio"
              name="role"
              id="roleLandlord"
              value="landlord"
              style="display: none"
            />
          </div>
        </div>

        <button class="choose-btn" id="continueBtn" disabled>Continue</button>

        <p class="choose-footer-text">Already have an account? <a href="login.html">Log In</a></p>
      </div>
    </main>

    <!-- Decorative Corner Images -->
    <div class="signup-decorative-images">
      <div class="signup-decorative-left">
        <img src="../../../assets/images/public/signup_lower_right.png" alt="" />
      </div>
      <div class="signup-decorative-right">
        <img src="../../../assets/images/public/signup_lower_left.png" alt="" />
      </div>
    </div>

    <script type="module" src="../../../js/auth/choose.js"></script>
  </body>
</html>
