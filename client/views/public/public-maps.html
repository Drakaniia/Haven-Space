<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg" />
    <title>Map View - Haven Space</title>
    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/global.css" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #map {
        width: 100%;
        height: 100vh;
        position: absolute;
        top: 0;
        left: 0;
      }

      /* Close button */
      .close-button {
        position: absolute;
        top: 16px;
        left: 16px;
        z-index: 1000;
        width: 40px;
        height: 40px;
        background-color: white;
        border: none;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.2s ease;
      }

      .close-button:hover {
        background-color: #f5f5f5;
      }

      .close-button svg {
        width: 20px;
        height: 20px;
        stroke: #1a1a1a;
        stroke-width: 2;
      }

      /* Leaflet popup styling */
      .leaflet-popup-content-wrapper {
        border-radius: 8px;
      }

      .leaflet-popup-content {
        font-family: 'Plus Jakarta Sans', sans-serif;
        margin: 8px;
      }
    </style>
  </head>
  <body>
    <button class="close-button" onclick="window.history.back()" aria-label="Close map view">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        // Default location (Malaybalay City, Mindanao, Philippines)
        const defaultLocation = [8.1489, 125.125];

        // Create map centered at default location
        const map = L.map('map').setView(defaultLocation, 14);

        // Add OpenStreetMap tiles
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
          attribution: '© OpenStreetMap',
        }).addTo(map);

        // Sample landlord properties (this will be replaced with API data)
        const landlordProperties = [
          { id: 1, lat: 8.15, lng: 125.126 },
          { id: 2, lat: 8.148, lng: 125.124 },
          { id: 3, lat: 8.151, lng: 125.127 },
          { id: 4, lat: 8.147, lng: 125.123 },
          { id: 5, lat: 8.152, lng: 125.128 },
        ];

        // Create custom pin icon
        const pinIcon = L.icon({
          iconUrl: '../../assets/images/pin.png',
          iconSize: [40, 50],
          iconAnchor: [20, 50],
          popupAnchor: [0, -50],
        });

        // Add pin markers for landlord properties (no popup info)
        landlordProperties.forEach(property => {
          L.marker([property.lat, property.lng], { icon: pinIcon }).addTo(map);
        });

        // Try to get user's location
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            position => {
              const userLocation = [position.coords.latitude, position.coords.longitude];
              map.setView(userLocation, 14);
            },
            error => {
              console.log('Geolocation error:', error);
            }
          );
        }
      });
    </script>
  </body>
</html>
