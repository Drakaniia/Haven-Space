    <!-- Leaflet CSS -->

      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script type="module">
      import { initIconElements } from '../../js/shared/icons.js';
      document.addEventListener('DOMContentLoaded', () => {
        initIconElements();

  </head>
  <body>
    <div class="maps-container">
      <!-- Full Screen Map -->
      <div class="map-section">
        <div id="map"></div>

        <!-- Close Button (Top Right) -->
        <button class="map-close-btn" id="close-map" title="Close Map">
          <span
            data-icon="close"
            data-icon-width="20"
            data-icon-height="20"
            data-icon-stroke-width="2"
          ></span>
          <span>Close</span>
        </button>

        <!-- Map Controls -->
        <div class="map-controls">
          <button class="map-control-btn" id="locate-me" title="Use my location">
            <span
              data-icon="target"
              data-icon-width="24"
              data-icon-height="24"
              data-icon-stroke-width="2"
            ></span>
          </button>
          <button class="map-control-btn" id="zoom-in" title="Zoom in">
            <span
              data-icon="plusLarge"
              data-icon-width="24"
              data-icon-height="24"
              data-icon-stroke-width="2"
            ></span>
          </button>
          <button class="map-control-btn" id="zoom-out" title="Zoom out">
            <span
              data-icon="minusLarge"
              data-icon-width="24"
              data-icon-height="24"
              data-icon-stroke-width="2"
            ></span>
          </button>
        </div>
      </div>
    </div>

    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script>
      let map;
      let markers = [];
      let userLocation = null;

      // Sample property data (replace with API call)
      const sampleProperties = [
        {
          id: 1,

          location: 'Sampaloc, Manila',

        },
        {
          id: 2,

          location: 'Diliman, Quezon City',
          price: 4500,
          lat: 8.148,
          lng: 125.124,
          rating: 4.3,
          reviewCount: 22,
          amenities: ['wifi', 'kitchen', 'parking'],
          type: 'boarding-house',
          phone: '0918 234 5678',
          description:
            'A peaceful boarding house surrounded by greenery. Perfect for students who want a quiet place to study with all the necessary amenities.',
          photos: [
            { url: '', category: 'All', label: 'All' },
            { url: '', category: 'Rooms', label: 'Rooms' },
            { url: '', category: 'Videos', label: 'Videos' },
            { url: '', category: 'Common Areas', label: 'Common' },
          ],
          reviews: [
            {
              author: 'Anna Cruz',
              initial: 'A',

              rating: 4,
              text: 'Very peaceful environment. The kitchen is fully equipped and the parking area is secure.',
              tags: ['customer-service'],
            },
          ],

            4: 7,

            1: 0,
          },
        },
        {
          id: 3,
          title: 'Cozy Student Dorm',
          location: 'Near University Ave',
          price: 6000,
          lat: 8.151,
          lng: 125.127,
          rating: 4.7,
          reviewCount: 36,
          amenities: ['wifi', 'ac', 'laundry', 'security'],
          type: 'dorm',
          phone: '0919 345 6789',
          description:
            'A premium student dormitory with top-notch security and modern amenities. Walking distance to the university campus.',
          photos: [
            { url: '', category: 'All', label: 'All' },
            { url: '', category: 'Rooms', label: 'Rooms' },
            { url: '', category: 'Videos', label: 'Videos' },
            { url: '', category: 'Facilities', label: 'Facilities' },
          ],
          reviews: [
            {
              author: 'Princess Nicole Mora',
              initial: 'P',
              date: '3 months ago',
              rating: 5,
              text: "Just booked our overnight stay with them and it was very good! Place and room is very spacious and the food is great especially for breakfast as well. You get the rest that you crave for and it's been a wonderful experience for me 10/10",
              tags: ['customer-service', 'price'],
            },
            {
              author: 'Carlos Mendoza',
              initial: 'C',
              date: '1 month ago',
              rating: 4,
              text: 'Great security features and the location is perfect. The amenities are well-maintained.',
              tags: ['customer-service'],
            },
          ],
          reviewSummary: {
            5: 28,
            4: 5,
            3: 2,
            2: 1,
            1: 0,
          },
        },
      ];

      // Initialize the map
      function initMap() {
        // Default location (Malaybalay City, Mindanao, Philippines)
        const defaultLocation = [8.1489, 125.125];

        // Create map centered at default location
        map = L.map('map').setView(defaultLocation, 16);

        // Add OpenStreetMap tiles
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {}).addTo(map);

        // Add property markers
        addPropertyMarkers(sampleProperties);

        // Setup event listeners
        setupEventListeners();
      }

      // Add property markers to map
      function addPropertyMarkers(properties) {
        // Clear existing markers
        markers.forEach(marker => map.removeLayer(marker));
        markers = [];

        // Create custom pin icon
        const pinIcon = L.icon({
          iconUrl: '../../assets/images/pin.png',
          iconSize: [40, 50],
          iconAnchor: [20, 50],
          popupAnchor: [0, -50],
        });

        properties.forEach(property => {
          // Create custom popup content
          const popupContent = `
            <div class="property-popup">
              <div class="property-popup-image"></div>
              <div class="property-popup-content">
                <h3 class="property-popup-title">${property.title}</h3>
                <div class="property-popup-location">
                  <span data-icon="location" data-icon-width="12" data-icon-height="12" data-icon-stroke-width="2"></span>
                  ${property.location}
                </div>
                <div class="property-popup-price">₱${property.price.toLocaleString()}/month</div>
                <div class="property-popup-amenities">
                  ${property.amenities
                    .slice(0, 3)
                    .map(a => `<span class="amenity-badge">${a}</span>`)
                    .join('')}
                </div>
              </div>
            </div>
          `;

          // Create marker with pin icon
          const marker = L.marker([property.lat, property.lng], { icon: pinIcon })
            .addTo(map)
            .bindPopup(popupContent);

          markers.push(marker);
        });
      }

      // Setup event listeners
      function setupEventListeners() {
        // Close map button - redirect back to find-a-room page
        const closeBtn = document.getElementById('close-map');
        console.log('Close button element:', closeBtn);

        if (closeBtn) {
          closeBtn.addEventListener('click', () => {
            console.log('Close button clicked! Redirecting to find-a-room page...');
            // Always redirect to public find-a-room page
            window.location.href = './find-a-room.html';
          });
          console.log('Close button event listener attached successfully');
        } else {
          console.error('Close button not found!');
        }

        // Locate me button
        const locateBtn = document.getElementById('locate-me');
        if (locateBtn) {
          locateBtn.addEventListener('click', getUserLocation);
        }

        // Zoom controls
        const zoomInBtn = document.getElementById('zoom-in');
        const zoomOutBtn = document.getElementById('zoom-out');
        if (zoomInBtn) zoomInBtn.addEventListener('click', () => map.zoomIn());
        if (zoomOutBtn) zoomOutBtn.addEventListener('click', () => map.zoomOut());
      }

      // Perform search with filters
      // Update properties list (simplified - no filters)
      function updatePropertiesList(properties) {
        const container = document.getElementById('properties-list');
        if (!container) return;

        if (properties.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <span class="empty-state-icon" data-icon="building" data-icon-width="48" data-icon-height="48" data-icon-stroke-width="1.5"></span>
              <h3 class="empty-state-title">No properties found</h3>
              <p class="empty-state-description">Try adjusting your search area</p>
            </div>
          `;
          return;
        }

        container.innerHTML = properties
          .map(
            property => `
          <div class="property-card" data-id="${property.id}">
            <div class="property-card-image"></div>
            <div class="property-card-content">
              <div class="property-card-header">
                <h3 class="property-card-title">${property.title}</h3>
                <div class="property-card-rating">
                  <span data-icon="starSolid" data-icon-width="14" data-icon-height="14" style="color: #f59e0b;"></span>
                  ${property.rating}
                </div>
              </div>
              <div class="property-card-location">
                <span data-icon="location" data-icon-width="12" data-icon-height="12" data-icon-stroke-width="2"></span>
                ${property.location}
              </div>
              <div class="property-card-footer">
                <div class="property-card-price">₱${property.price.toLocaleString()}<span>/month</span></div>
                <button class="property-card-btn" onclick="viewProperty(${
                  property.id
                })">View</button>
              </div>
            </div>
          </div>
        `
          )
          .join('');
      }

      // Get user location
      function getUserLocation() {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            position => {
              userLocation = {
                lat: position.coords.latitude,
                lng: position.coords.longitude,
              };

              // Center map on user location
              map.setView([userLocation.lat, userLocation.lng], 16);

              // Add user location marker
              L.marker([userLocation.lat, userLocation.lng])
                .addTo(map)
                .bindPopup('You are here')
                .openPopup();
            },
            error => {
              alert('Unable to get your location. Please enable location permissions.');
            }
          );
        } else {
          alert('Geolocation is not supported by your browser.');
        }
      }

      // View property (show detail sidebar)
      function viewProperty(id) {
        const property = sampleProperties.find(p => p.id === id);
        if (!property) return;

        // Populate property details
        document.getElementById('detail-title').textContent = property.title;
        document.getElementById('detail-rating-number').textContent = property.rating;
        document.getElementById('detail-rating-count').textContent = `(${
          property.reviewCount || 36
        })`;

        // Populate photos/videos
        const photoVideoGrid = document.getElementById('photo-video-grid');
        photoVideoGrid.innerHTML = (property.photos || [])
          .map(
            photo => `
            <div class="photo-video-item">
              <div class="photo-placeholder"></div>
              <div class="photo-label">${photo.label}</div>
            </div>
          `
          )
          .join('');

        // Populate review summary
        const reviewScore = document.getElementById('review-score');
        const reviewTotal = document.getElementById('review-total');
        reviewScore.textContent = property.rating;
        reviewTotal.textContent = `${property.reviewCount || 36} reviews`;

        // Update review bars
        const reviewSummary = property.reviewSummary || {};
        const totalReviews = property.reviewCount || 36;
        for (let i = 1; i <= 5; i++) {
          const bar = document.getElementById(`review-bar-${i}`);
          if (bar) {
            const count = reviewSummary[i] || 0;
            const percentage = totalReviews > 0 ? (count / totalReviews) * 100 : 0;
            bar.style.width = `${percentage}%`;
          }
        }

        // Populate reviews
        const reviewsContainer = document.getElementById('reviews-list');
        const reviews = property.reviews || [
          {
            author: 'Princess Nicole Mora',
            initial: 'P',
            date: '3 months ago',
            rating: 5,
            text: "Just booked our overnight stay with them and it was very good! Place and room is very spacious and the food is great especially for breakfast as well. You get the rest that you crave for and it's been a wonderful experience for me 10/10",
            tags: ['customer-service'],
          },
          {
            author: 'Juan Dela Cruz',
            initial: 'J',
            date: '1 month ago',
            rating: 4,
            text: 'Great location near the university. The amenities are good and the landlord is responsive to concerns.',
            tags: ['price'],
          },
        ];

        reviewsContainer.innerHTML = reviews
          .map(
            review => `
            <div class="review-item">
              <div class="review-item-header">
                <div class="review-author-avatar">${review.initial}</div>
                <div class="review-author-info">
                  <div class="review-author-name">${review.author}</div>
                  <div class="review-date">${review.date}</div>
                </div>
                <div class="review-item-rating">
                  ${Array.from(
                    { length: 5 },
                    (_, i) =>
                      `<span data-icon="${
                        i < review.rating ? 'starSolid' : 'star'
                      }" data-icon-width="14" data-icon-height="14" style="color: ${
                        i < review.rating ? '#f59e0b' : '#d1d5db'
                      };"></span>`
                  ).join('')}
                </div>
              </div>
              <p class="review-text">${review.text}</p>
            </div>
          `
          )
          .join('');

        // Switch to detail view
        document.getElementById('search-state').style.display = 'none';
        document.getElementById('property-detail-state').style.display = 'flex';

        // Focus map on property
        map.setView([property.lat, property.lng], 18);
      }

      // Switch back to search view
      function switchToSearch() {
        document.getElementById('property-detail-state').style.display = 'none';
        document.getElementById('search-state').style.display = 'flex';
      }

      // Filter reviews based on selected filter
      function filterReviews(filter) {
        const reviewsContainer = document.getElementById('reviews-list');
        const allReviews = reviewsContainer.querySelectorAll('.review-item');

        allReviews.forEach(review => {
          if (filter === 'all') {
            review.style.display = 'block';
          } else {
            // In a real implementation, you would check the review's tags
            // For now, just show all reviews
            review.style.display = 'block';
          }
        });
      }

      // Tab switching functionality
      function setupTabSwitching() {
        document.querySelectorAll('.detail-tab').forEach(tab => {
          tab.addEventListener('click', () => {
            // Remove active class from all tabs
            document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
            document
              .querySelectorAll('.detail-tab-panel')
              .forEach(p => p.classList.remove('active'));

            // Add active class to clicked tab
            tab.classList.add('active');

            // Show corresponding panel
            const tabName = tab.dataset.tab;
            document.getElementById(`${tabName}-panel`).classList.add('active');
          });
        });
      }

      // Initialize when page loads
      window.addEventListener('load', () => {
        initMap();
      });
    </script>
  </body>
</html>
