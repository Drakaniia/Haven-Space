<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" fill="#f3f4f6"/>
  
  <!-- House illustration -->
  <g transform="translate(100, 80)">
    <!-- Roof -->
    <path d="M 100 20 L 200 80 L 200 90 L 0 90 L 0 80 Z" fill="#6b7280"/>
    
    <!-- Main building -->
    <rect x="20" y="90" width="160" height="120" fill="#9ca3af"/>
    
    <!-- Door -->
    <rect x="80" y="150" width="40" height="60" fill="#4b5563" rx="2"/>
    <circle cx="110" cy="180" r="3" fill="#d1d5db"/>
    
    <!-- Windows -->
    <rect x="40" y="110" width="30" height="30" fill="#e5e7eb" rx="2"/>
    <rect x="130" y="110" width="30" height="30" fill="#e5e7eb" rx="2"/>
    
    <!-- Window dividers -->
    <line x1="55" y1="110" x2="55" y2="140" stroke="#9ca3af" stroke-width="2"/>
    <line x1="40" y1="125" x2="70" y2="125" stroke="#9ca3af" stroke-width="2"/>
    <line x1="145" y1="110" x2="145" y2="140" stroke="#9ca3af" stroke-width="2"/>
    <line x1="130" y1="125" x2="160" y2="125" stroke="#9ca3af" stroke-width="2"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">
    No Image Available
  </text>
</svg>
