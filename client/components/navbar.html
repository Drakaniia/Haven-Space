<!-- Navbar Component Template -->
<!-- This template is injected by navbar.js -->

<header class="navbar">
  <div class="navbar-left">
    <!-- Sidebar Toggle Button -->
    <button
      class="navbar-icon-btn navbar-sidebar-toggle"
      id="navbar-sidebar-toggle"
      aria-label="Toggle sidebar"
    >
      <img
        src="https://api.iconify.design/mingcute:layout-left-line.svg"
        class="navbar-sidebar-icon"
        id="navbar-sidebar-icon-left"
        width="24"
        height="24"
        alt="Collapse sidebar"
      />
      <img
        src="https://api.iconify.design/mingcute:layout-right-line.svg"
        class="navbar-sidebar-icon"
        id="navbar-sidebar-icon-right"
        width="24"
        height="24"
        alt="Expand sidebar"
        style="display: none"
      />
    </button>
  </div>

  <div class="navbar-right">
    <!-- Theme Toggle -->
    <button class="navbar-icon-btn" id="navbar-theme-toggle" aria-label="Toggle theme">
      <img
        src="https://api.iconify.design/mingcute:moon-cloudy-line.svg"
        class="navbar-theme-icon"
        id="navbar-theme-icon-light"
        width="24"
        height="24"
        alt="Switch to dark mode"
      />
      <img
        src="https://api.iconify.design/mingcute:moon-cloudy-fill.svg"
        class="navbar-theme-icon"
        id="navbar-theme-icon-dark"
        width="24"
        height="24"
        alt="Switch to light mode"
        style="display: none"
      />
    </button>

    <!-- Notifications -->
    <button class="navbar-icon-btn" id="navbar-notifications" aria-label="Notifications">
      <span class="navbar-icon-placeholder" data-icon="bell"></span>
      <span
        class="navbar-notification-badge"
        id="navbar-notification-badge"
        style="display: none"
      ></span>
    </button>

    <!-- User Avatar -->
    <div class="navbar-user" id="navbar-user">
      <img
        class="navbar-avatar-img"
        id="navbar-avatar-img"
        src=""
        alt="User Avatar"
        onerror="if(!this.dataset.errorHandled){this.dataset.errorHandled='true';this.src='assets/images/sample.png';console.error('Avatar image failed to load, using fallback');}"
      />
    </div>

    <!-- User Dropdown Menu -->
    <div class="navbar-user-menu" id="navbar-user-menu">
      <div class="navbar-user-menu-header">
        <div class="navbar-user-menu-avatar" id="navbar-user-menu-avatar">JD</div>
        <div class="navbar-user-menu-info">
          <div class="navbar-user-menu-name" id="navbar-user-menu-name">Juan Dela Cruz</div>
          <div class="navbar-user-menu-email" id="navbar-user-menu-email">juan@example.com</div>
        </div>
      </div>
      <div class="navbar-user-menu-divider"></div>
      <a href="#" class="navbar-user-menu-item" id="navbar-menu-profile">
        <span class="navbar-icon-placeholder" data-icon="user"></span>
        <span>Profile</span>
      </a>
      <a href="#" class="navbar-user-menu-item" id="navbar-menu-settings">
        <span class="navbar-icon-placeholder" data-icon="settings"></span>
        <span>Settings</span>
      </a>
      <div class="navbar-user-menu-divider"></div>
      <a href="#" class="navbar-user-menu-item navbar-user-menu-logout" id="navbar-menu-logout">
        <span class="navbar-icon-placeholder" data-icon="logout"></span>
        <span>Log out</span>
      </a>
    </div>

    <!-- Notification Popup Menu -->
    <div class="navbar-notification-menu" id="navbar-notification-menu">
      <div class="navbar-notification-menu-header">
        <h3 class="navbar-notification-menu-title">Notifications</h3>
        <button class="navbar-notification-menu-clear" id="navbar-clear-notifications">
          Mark all as read
        </button>
      </div>
      <div class="navbar-notification-menu-divider"></div>
      <div class="navbar-notification-list" id="navbar-notification-list">
        <!-- Notification items will be injected here -->
      </div>
      <div class="navbar-notification-menu-footer">
        <a href="#" class="navbar-notification-view-all" id="navbar-view-all-notifications">
          View all notifications
        </a>
      </div>
    </div>
  </div>
</header>
