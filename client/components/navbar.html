<!-- Navbar Component Template -->
<!-- This template is injected by navbar.js -->

<header class="navbar">
  <div class="navbar-left">
    <!-- Search Bar -->
    <div class="navbar-search">
      <svg
        class="navbar-search-icon"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.5"
          d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
        />
      </svg>
      <input
        type="text"
        class="navbar-search-input"
        placeholder="Search"
        id="navbar-search-input"
      />
      <div class="navbar-search-shortcut">
        <span class="navbar-shortcut-key">⌘</span>
        <span class="navbar-shortcut-key">K</span>
      </div>
    </div>
  </div>

  <div class="navbar-right">
    <!-- Theme Toggle -->
    <button class="navbar-icon-btn" id="navbar-theme-toggle" aria-label="Toggle theme">
      <svg
        class="navbar-icon"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.5"
          d="M21.752 15.002A9.718 9.718 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"
        />
      </svg>
    </button>

    <!-- Notifications -->
    <button class="navbar-icon-btn" id="navbar-notifications" aria-label="Notifications">
      <svg
        class="navbar-icon"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.5"
          d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"
        />
      </svg>
      <span class="navbar-notification-badge" id="navbar-notification-badge">3</span>
    </button>

    <!-- User Avatar -->
    <div class="navbar-user" id="navbar-user">
      <img
        class="navbar-avatar-img"
        id="navbar-avatar-img"
        src=""
        alt="User Avatar"
        onerror="console.error('Avatar image failed to load:', this.src)"
      />
    </div>
  </div>
</header>
