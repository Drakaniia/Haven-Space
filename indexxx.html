<!DOCTYPE html>
<html>
<head>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: sans-serif;
    background-color: #ffffff; /* Base background */
    overflow-x: hidden;
  }

  .gradient-container {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1;
  }

  /* The Gradient Blobs */
  .blob {
    position: absolute;
    width: 600px;
    height: 500px;
    filter: blur(100px);
    z-index: -1;
    opacity: 0.6;
    border-radius: 50%;
  }

  .yellow-blob {
    top: -10%;
    left: -5%;
    background-color: #fdf2d5; /* Pale Yellow/Peach */
  }

  .green-blob {
    top: -10%;
    right: -5%;
    background-color: #d4e9d7; /* Sage Green */
  }

  .content {
    text-align: center;
    max-width: 700px;
  }
</style>
</head>
<body>

<div class="gradient-container">
  <div class="blob yellow-blob"></div>
  <div class="blob green-blob"></div>
  
  <div class="content">
    <h1>Invest in property, build your future</h1>
    <p>Take control of your financial future by diversifying your portfolio.</p>
  </div>
</div>

</body>
</html>
