# Haven Space API Configuration
# This file configures Apache to serve the PHP API

# Alias for API requests
Alias /api "C:/Users/Qwenzy/Desktop/haven-space/server/api"

<Directory "C:/Users/Qwenzy/Desktop/haven-space/server/api">
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted

    # Enable rewrite engine for clean URLs
    RewriteEngine On

    # If the requested file exists, serve it directly
    RewriteCond %{REQUEST_FILENAME} -f
    RewriteRule ^ - [L]

    # Otherwise, route to index.php
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteRule ^ index.php [L]
</Directory>

# Ensure PHP files are processed
<FilesMatch \.php$>
    SetHandler application/x-httpd-php
</FilesMatch>
