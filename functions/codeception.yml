namespace: Tests
support_namespace: Support
paths:
  tests: tests
  output: tests/_output
  data: tests/Support/Data
  support: tests/Support
  envs: tests/_envs
actor_suffix: Tester
extensions:
  enabled:
    - Codeception\Extension\RunFailed
suites:
  api:
    actor: ApiTester
    modules:
      enabled:
        - REST:
            url: http://localhost:8000
            depends: PhpBrowser
            part: Json
        - PhpBrowser:
            url: http://localhost:8000
