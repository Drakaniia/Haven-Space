services:
  - type: pserv
    name: haven-space-db
    runtime: docker
    region: singapore
    plan: free
    image: mysql/mysql-server:8.0
    envVars:
      - key: MYSQL_DATABASE
        value: havenspace_db
      - key: MYSQL_USER
        value: havenspace_user
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      size: 1GB

  - type: web
    name: haven-space-api
    runtime: docker
    rootDir: server
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health.php
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: '3600'
      - key: REFRESH_TOKEN_EXPIRATION
        value: '604800'
      - key: DB_HOST
        fromService:
          name: haven-space-db
          property: host
      - key: DB_PORT
        value: '3306'
      - key: DB_NAME
        value: havenspace_db
      - key: DB_USER
        value: havenspace_user
      - key: DB_PASSWORD
        fromService:
          name: haven-space-db
          envVarKey: MYSQL_PASSWORD
      - key: DB_SSL_MODE
        value: DISABLED
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
