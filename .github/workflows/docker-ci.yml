name: Docker CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: 'docker-${{ github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: false
          load: true
          tags: haven-space-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image
        run: docker save haven-space-api:latest | gzip > haven-space-api.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: haven-space-api.tar.gz
          retention-days: 1

  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: server/Dockerfile
          failure-threshold: error

  health-check:
    name: Health Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < haven-space-api.tar.gz

      - name: Run container
        run: |
          docker run -d --name haven-space-api -p 8080:80 haven-space-api:latest
          sleep 10

      - name: Check health endpoint
        run: |
          curl --fail --retry 3 --retry-delay 5 http://localhost:8080/health.php || exit 1

      - name: Cleanup
        if: always()
        run: |
          docker stop haven-space-api || true
          docker rm haven-space-api || true
